# GeyserMenu 配置文件
# 作者: 柠枺
# 版本: 1.3.0-beta2
# 配置版本号 - 用于自动迁移配置
config-version: 3

# 插件基础设置
settings:
  # 语言设置 - 支持的语言: zh_cn (中文), en (英文)
  language: "zh_cn"
  
  # 默认菜单文件名 - 当玩家直接使用/gmenu时打开的菜单
  default-menu: "menu.yml"
  
  # 调试模式 - 启用后会输出更多日志信息
  debug: false
  
  # 性能优化设置
  performance:
    # 命令执行延迟（毫秒）- 防止命令执行过快导致服务器卡顿
    command-delay: 0
    
    # 是否缓存PAPI变量结果 - 可以提高性能，但变量更新会有延迟
    cache-placeholders: false
    
    # 缓存刷新间隔（秒）- 仅在启用变量缓存时生效
    cache-refresh: 30
    
    # 最大缓存数量 - 防止缓存占用过多内存
    max-cache-size: 1000
    
    # 是否在重载时清除缓存
    clear-cache-on-reload: true
    
    # 表单打开冷却时间(毫秒)
    form-cooldown: 500
    
    # 是否在调试模式下记录表单冷却信息
    log-form-cooldown: false
    
  # 命令安全检查 - 防止执行危险命令
  enable-command-security: true
  
  # 是否检查更新
  check-updates: true
  
  # 更新源设置
  update:
    # 是否在玩家进入时提示更新
    notify-on-join: true
    
    # 是否只通知管理员
    notify-ops-only: false
  
  # 统计设置
  statistics:
    # 是否启用 BStats 统计 - 帮助开发者了解插件使用情况
    enable-bstats: true
    
    # 是否收集自定义统计数据
    collect-custom-data: true

# 菜单配置 - 在这里定义所有可用的菜单
menus:
  # 主菜单配置
  main:
    # 菜单文件名
    file: "menu.yml"
    # 是否启用此菜单
    enable: true
    # 使用此菜单需要的权限（可选）
    permission: "geysermenu.menu.main"
  
  # 传送菜单配置
  teleport:
    file: "teleport.yml"
    enable: true
    permission: "geysermenu.menu.teleport"
  
  # 商店菜单配置
  shop:
    file: "shop.yml"
    enable: true
    permission: "geysermenu.menu.shop"
  
  # 确认菜单示例
  confirm:
    file: "confirm.yml"
    enable: true
    permission: "geysermenu.menu.confirm"
  
  # 设置菜单示例
  settings:
    file: "settings.yml"
    enable: true
    permission: "geysermenu.menu.settings"
  
  # 示例：禁用的菜单
  example:
    file: "example.yml"
    enable: false

# 图标设置
icons:
  # 默认图标
  default: "textures/items/paper"
  
  # 是否允许URL图标
  allow_url: true
  
  # URL图标设置
  url:
    # 是否仅允许HTTPS
    https-only: true
    # URL最大长度
    max-length: 256
    # 允许的域名列表（为空则允许所有）
    allowed-domains: []
  
